# Few-shot examples per register.
#
# Each example is a (translationese, native, reasoning) triple.
# These are injected into the polish prompt as concrete demonstrations.
# Quality > quantity. 3-5 strong examples per register beats 20 mediocre ones.

lexilog:
  - input: |
      Λέξη: φιλοτιμία
      Ορισμός: Αυτή η λέξη αναφέρεται στο αίσθημα του χρέους και της τιμής που νιώθει κάποιος και που τον σπρώχνει να κάνει το σωστό πράγμα.
      Παράδειγμα: Λόγω της φιλοτιμίας του, αποφάσισε να βοηθήσει τον γείτονά του.
    output: |
      Λέξη: φιλοτιμία
      Ορισμός: Αίσθημα προσωπικής τιμής και ηθικού καθήκοντος που ωθεί κάποιον να ανταποκρίνεται σε υποχρεώσεις πέρα από το αυστηρά απαιτούμενο.
      Παράδειγμα: Από φιλοτιμία και μόνο, έμεινε στη δουλειά μέχρι αργά για να τελειώσει τη βάρδια του συναδέλφου.
    reasoning: |
      Definition: removed «Αυτή η λέξη αναφέρεται στο» (meta-prefix). Replaced
      «κάνει το σωστό πράγμα» (calque of "does the right thing") with
      «ανταποκρίνεται σε υποχρεώσεις». The result reads like a real Greek
      dictionary entry.
      Example: replaced the textbook-shaped «Λόγω της φιλοτιμίας του» with
      the much more natural «Από φιλοτιμία και μόνο», which is how Greeks
      actually use this word in conversation.

  - input: |
      Λέξη: μεράκι
      Ορισμός: Είναι μια λέξη που σημαίνει την αγάπη και το πάθος που βάζει κάποιος στη δουλειά του ή σε κάτι που κάνει.
      Παράδειγμα: Έφτιαξε το φαγητό με πολύ μεράκι.
    output: |
      Λέξη: μεράκι
      Ορισμός: Η αγάπη, η αφοσίωση και η προσωπική φροντίδα που επενδύει κάποιος σε αυτό που φτιάχνει ή κάνει.
      Παράδειγμα: Το μαγαζί δουλεύει ακόμα με το παλιό μεράκι του παππού — όλα φτιάχνονται με το χέρι.
    reasoning: |
      Definition: cut «Είναι μια λέξη που σημαίνει» — pure filler. The example
      was technically correct but flat; replaced with one that shows μεράκι in
      a richer cultural context (family business, handcraft) where the word
      actually lives.

marketing:
  - input: |
      Η εταιρεία μας προσφέρει υπηρεσίες catering υψηλής ποιότητας με εξειδικευμένο προσωπικό και φρέσκα υλικά για να κάνετε την εκδήλωσή σας μια αξέχαστη εμπειρία.
    output: |
      Catering με σεβασμό στο φαγητό και στους καλεσμένους σας. Μαγειρεύουμε φρέσκα, σερβίρουμε όμορφα, και κρατάμε την εκδήλωσή σας στον ρυθμό που της αξίζει.
    reasoning: |
      The original is the kind of "high-quality services" Greek that says
      nothing. Replaced with concrete claims (μαγειρεύουμε, σερβίρουμε,
      κρατάμε) and a phrase Greeks would actually use («σεβασμός στο φαγητό»).
      Cut «αξέχαστη εμπειρία» which is the most overused phrase in Greek
      marketing. The rhythm is short-medium-long, which reads aloud well.

  - input: |
      Ανακαλύψτε τη νέα μας συλλογή που έχει σχεδιαστεί για να καλύψει τις ανάγκες σας με στυλ και άνεση.
    output: |
      Νέα συλλογή. Φτιαγμένη για να φοριέται — όχι μόνο να αγοράζεται.
    reasoning: |
      Cut «Ανακαλύψτε» (calque of "Discover", flagship of bad Greek marketing).
      Cut the empty «να καλύψει τις ανάγκες σας με στυλ και άνεση» — pure
      filler. The replacement is short, has rhythm, and makes a real claim.

business:
  - input: |
      Αγαπητέ κύριε,

      Ελπίζω αυτό το μήνυμα σας βρίσκει καλά. Θα ήθελα να σας ενημερώσω ότι έχουμε λάβει το αίτημά σας και βρίσκεται υπό επεξεργασία. Παρακαλώ μη διστάσετε να επικοινωνήσετε μαζί μας εάν έχετε οποιεσδήποτε ερωτήσεις.

      Σας ευχαριστούμε για την κατανόησή σας.

      Με εκτίμηση,
    output: |
      Αγαπητέ κύριε,

      Λάβαμε το αίτημά σας και το επεξεργαζόμαστε αυτή τη στιγμή. Θα σας ενημερώσουμε με την εξέλιξη μέσα στις επόμενες δύο εργάσιμες.

      Είμαστε στη διάθεσή σας για οτιδήποτε χρειαστείτε στο μεταξύ.

      Με εκτίμηση,
    reasoning: |
      Removed three pieces of pure filler: «Ελπίζω... σας βρίσκει καλά» (English
      email convention), «Παρακαλώ μη διστάσετε» (replaced with the warmer
      «Είμαστε στη διάθεσή σας»), and «Σας ευχαριστούμε για την κατανόησή σας»
      (empty pre-emptive thanks). Added a concrete commitment («εντός δύο
      εργάσιμων») which is what professional Greek correspondence values.
      The email is now shorter AND warmer AND more useful.

  - input: |
      Κάνουμε μια απόφαση να προχωρήσουμε με τον προμηθευτή Α βασισμένοι στα feedback που λάβαμε από την ομάδα.
    output: |
      Με βάση τις παρατηρήσεις της ομάδας, αποφασίσαμε να προχωρήσουμε με τον προμηθευτή Α.
    reasoning: |
      Three fixes: «κάνουμε μια απόφαση» → «αποφασίσαμε» (Greek takes
      decisions), «feedback» → «παρατηρήσεις», and the participial
      «βασισμένοι στα» → the cleaner prepositional phrase «με βάση».
      Sentence is shorter and reads like Greek, not translated English.
