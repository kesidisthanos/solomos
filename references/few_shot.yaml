# Solomos Few-Shot Examples: slim edition (2026-05-07)
#
# Each entry: (input = translationese/AI-flat draft) + (output = natural Greek)
# + brief note on what changed at the headline level.
#
# These exemplars are TARGETS, not decoder rings. Read once to internalize
# the voice. Don't navigate them rule-by-rule when generating.
#
# The full move-by-move reasoning (per-rule analysis) lives at
# references/archive/few_shot_full.yaml for reference.

lexilog:
  - input: |
      Λέξη: φιλοτιμία
      Ορισμός: Αυτή η λέξη αναφέρεται στο αίσθημα του χρέους και της τιμής που νιώθει κάποιος και που τον σπρώχνει να κάνει το σωστό πράγμα.
      Παράδειγμα: Λόγω της φιλοτιμίας του, αποφάσισε να βοηθήσει τον γείτονά του.
    output: |
      Λέξη: φιλοτιμία
      Ορισμός: Αίσθημα προσωπικής τιμής και ηθικού καθήκοντος που ωθεί κάποιον να ανταποκρίνεται σε υποχρεώσεις πέρα από το αυστηρά απαιτούμενο.
      Παράδειγμα: Από φιλοτιμία και μόνο, έμεινε στη δουλειά μέχρι αργά για να τελειώσει τη βάρδια του συναδέλφου.
    note: "Cut «Αυτή η λέξη αναφέρεται στο» (meta-prefix). «Από φιλοτιμία και μόνο» is how Greeks actually use this word."

  - input: |
      Λέξη: μεράκι
      Ορισμός: Είναι μια λέξη που σημαίνει την αγάπη και το πάθος που βάζει κάποιος στη δουλειά του ή σε κάτι που κάνει.
      Παράδειγμα: Έφτιαξε το φαγητό με πολύ μεράκι.
    output: |
      Λέξη: μεράκι
      Ορισμός: Η αγάπη, η αφοσίωση και η προσωπική φροντίδα που επενδύει κάποιος σε αυτό που φτιάχνει ή κάνει.
      Παράδειγμα: Το μαγαζί δουλεύει ακόμα με το παλιό μεράκι του παππού. Όλα φτιάχνονται με το χέρι.
    note: "Cut «Είναι μια λέξη που σημαίνει» (filler). Example shifted to handcraft context where μεράκι actually lives."

marketing:
  - input: |
      Η εταιρεία μας προσφέρει υπηρεσίες catering υψηλής ποιότητας με εξειδικευμένο προσωπικό και φρέσκα υλικά για να κάνετε την εκδήλωσή σας μια αξέχαστη εμπειρία.
    output: |
      Catering με σεβασμό στο φαγητό και στους καλεσμένους σας. Μαγειρεύουμε φρέσκα, σερβίρουμε όμορφα, και κρατάμε την εκδήλωσή σας στον ρυθμό που της αξίζει.
    note: "Replaced «high-quality services» Greek with concrete claims. Cut «αξέχαστη εμπειρία»."

  - input: |
      Ανακαλύψτε τη νέα μας συλλογή που έχει σχεδιαστεί για να καλύψει τις ανάγκες σας με στυλ και άνεση.
    output: |
      Νέα συλλογή. Φτιαγμένη για να φοριέται, όχι μόνο να αγοράζεται.
    note: "Cut «Ανακαλύψτε» (calque of Discover). Made a real claim instead of empty filler."

business:
  - input: |
      Αγαπητέ κύριε,

      Ελπίζω αυτό το μήνυμα σας βρίσκει καλά. Θα ήθελα να σας ενημερώσω ότι έχουμε λάβει το αίτημά σας και βρίσκεται υπό επεξεργασία. Παρακαλώ μη διστάσετε να επικοινωνήσετε μαζί μας εάν έχετε οποιεσδήποτε ερωτήσεις.

      Σας ευχαριστούμε για την κατανόησή σας.

      Με εκτίμηση,
    output: |
      Αγαπητέ κύριε,

      Λάβαμε το αίτημά σας και το επεξεργαζόμαστε αυτή τη στιγμή. Θα σας ενημερώσουμε με την εξέλιξη μέσα στις επόμενες δύο εργάσιμες.

      Είμαστε στη διάθεσή σας για οτιδήποτε χρειαστείτε στο μεταξύ.

      Με εκτίμηση,
    note: "Cut «Ελπίζω... σας βρίσκει καλά» + «Παρακαλώ μη διστάσετε» + empty thanks. Added concrete commitment."

  - input: |
      Κάνουμε μια απόφαση να προχωρήσουμε με τον προμηθευτή Α βασισμένοι στα feedback που λάβαμε από την ομάδα.
    output: |
      Με βάση τις παρατηρήσεις της ομάδας, αποφασίσαμε να προχωρήσουμε με τον προμηθευτή Α.
    note: "«κάνουμε μια απόφαση» → «αποφασίσαμε», «feedback» → «παρατηρήσεις», «βασισμένοι στα» → «με βάση»."

cover-letter:
  - input: |
      Αγαπητέ κύριε/κυρία,

      Με την παρούσα επιστολή, εκφράζω το ενδιαφέρον μου για τη θέση του Senior Backend Engineer που έχετε διαθέσιμη στην εταιρεία σας. Πιστεύω ότι είμαι ένας ιδανικός υποψήφιος για αυτή τη θέση, καθώς διαθέτω 8 χρόνια εμπειρίας στον χώρο του software engineering.

      Στην προηγούμενή μου εργασία στην εταιρεία ABC, ήμουν υπεύθυνος για το σχεδιασμό και την υλοποίηση μιας πλατφόρμας microservices που εξυπηρετούσε εκατομμύρια χρήστες ημερησίως.

      Είμαι σίγουρος ότι θα είμαι σε θέση να προσφέρω σημαντική συνεισφορά στην ομάδα σας. Μη διστάσετε να επικοινωνήσετε μαζί μου για οποιαδήποτε πληροφορία.

      Με εκτίμηση,
    output: |
      Αγαπητέ κύριε/κυρία,

      Διάβασα την αγγελία σας για τη θέση Senior Backend Engineer και θα ήθελα να σας στείλω την υποψηφιότητά μου.

      Τα τελευταία 8 χρόνια δουλεύω στο backend, και τα τελευταία 3 σχεδιάζω microservices σε scale: στην ABC σχεδίασα και έφτιαξα την πλατφόρμα που εξυπηρετεί τη βασική μας ροή πληρωμών (peak 4 εκατ. αιτήσεις/ημέρα, p95 latency 80ms). Το stack ταιριάζει με αυτό που περιγράφετε στην αγγελία.

      Συνημμένο το βιογραφικό μου. Θα χαρώ να μιλήσουμε αν εκτιμάτε ότι ταιριάζει το προφίλ.

      Με εκτίμηση,
    note: "Vague flex → specific stat (peak 4M req/day, p95 80ms). Cut «εκφράζω το ενδιαφέρον μου», «μη διστάσετε», «είμαι σίγουρος»."

greeting-wishes:
  - input: |
      Αγαπημένη μου Μαρία,

      Σου εύχομαι από τα βάθη της καρδιάς μου χρόνια πολλά για τα γενέθλιά σου! Είσαι ένας υπέροχος άνθρωπος και σου αξίζουν όλα τα καλά της ζωής. Σε αυτή την ξεχωριστή μέρα σου εύχομαι όλα τα όνειρά σου να γίνουν πραγματικότητα και η ζωή σου να είναι γεμάτη αγάπη, υγεία και ευτυχία.

      Με αγάπη.
    output: |
      Μαρία μου,

      Χρόνια πολλά. Φέτος συμπληρώνεις 35 και είσαι πιο εσύ από ποτέ.

      Με αγάπη.
    note: "Hallmark calques out. Specific age + personal observation in. Three lines that mean something beat ten lines of generic."

  - input: |
      Λυπάμαι πολύ για την απώλεια του πατέρα σου. Ξέρω πόσο δύσκολη είναι αυτή η περίοδος για σένα και την οικογένειά σου. Ο πατέρας σου ήταν ένας υπέροχος άνθρωπος και σίγουρα βρίσκεται τώρα σε ένα καλύτερο μέρος. Είμαι σίγουρος ότι όλοι μας θα τον θυμόμαστε για πάντα. Στείλε μου ένα μήνυμα αν χρειάζεσαι οτιδήποτε.
    output: |
      Έμαθα για τον πατέρα σου. Βαριά απώλεια.

      Δεν τον γνώριζα καλά, αλλά θυμάμαι αυτό που μου είχες πει για τα Σαββατοκύριακα στο χωριό. Φαίνεται ότι ήταν άνθρωπος που κρατούσε τα ίδια του.

      Είμαι εδώ. Πάρε όσο χρόνο χρειάζεται.
    note: "«καλύτερο μέρος» calque cut. Honest non-knowledge instead of fake praise. Concrete shared memory + permission to not respond."

customer-service-letter:
  - input: |
      Αξιότιμοι κύριοι,

      Σας γράφω για να εκφράσω τη δυσαρέσκειά μου σχετικά με την παραγγελία μου με αριθμό A-12345 που έλαβα στις 12 Απριλίου 2026. Δυστυχώς, το προϊόν είχε σοβαρό πρόβλημα και επικοινώνησα πολλές φορές με την υποστήριξη πελατών χωρίς αποτέλεσμα. Είναι απαράδεκτο μια εταιρεία του μεγέθους σας να συμπεριφέρεται έτσι στους πελάτες της. Απαιτώ άμεση λύση. Θα προχωρήσω σε νομικές ενέργειες αν δεν λάβω απάντηση.

      Ευχαριστώ για τον χρόνο σας.
    output: |
      Προς το Τμήμα Εξυπηρέτησης Πελατών,

      Στις 12 Απριλίου 2026 παρέλαβα την παραγγελία #A-12345 (ηλεκτρική κουζίνα XYZ, 850€). Το προϊόν φέρει εμφανές κατασκευαστικό ελάττωμα στην πάνω εστία.

      Επικοινώνησα δύο φορές με την υποστήριξη πελατών (15/4 και 22/4) χωρίς να λάβω συγκεκριμένη απάντηση.

      Σύμφωνα με τον νόμο 2251/1994 για την προστασία του καταναλωτή, ζητώ αντικατάσταση του προϊόντος ή πλήρη επιστροφή του ποσού.

      Παρακαλώ απαντήστε εντός 14 εργάσιμων. Διαφορετικά θα προχωρήσω σε καταγγελία στον Συνήγορο του Καταναλωτή.

      Με εκτίμηση,
    note: "Emotion out, facts in. Specific law cited, specific recourse named, concrete deadline."

speech-or-toast:
  - input: |
      Αγαπητοί φίλοι και συγγενείς,

      Είναι πραγματικά μια συγκλονιστική εμπειρία να στέκομαι εδώ μπροστά σας σήμερα και να δίνω αυτή την πρόποση. Ο Νίκος και η Άννα είναι δύο υπέροχοι άνθρωποι που τους αξίζουν όλα τα καλά. Ο Νίκος είναι ένας στέρεος, ευγενικός και αξιόπιστος φίλος, και ο γάμος του με την Άννα σήμερα είναι ένα από τα πιο όμορφα γεγονότα που έχω παρακολουθήσει στη ζωή μου. Σας εύχομαι μια ζωή γεμάτη αγάπη, ευτυχία και υγεία. Στους νεόνυμφους!
    output: |
      Τον Νίκο τον γνώρισα στα είκοσί μας, σε ένα μετακόμισμα όπου του χάλασα το πιάνο μετακινώντας το λάθος. Με κοίταξε, σήκωσε τους ώμους και είπε: «Κάποια στιγμή θα έπρεπε να μάθω και κιθάρα.»

      Αυτό είναι όλος ο Νίκος σε μία πρόταση. Δεν χάνει τον χρόνο του στο τι έχασε.

      Όταν συνάντησε την Άννα, ήταν η πρώτη φορά που τον είδα να αλλάζει γνώμη για κάτι σημαντικό. Έγινε σιωπηλά, μέσα σε δύο εβδομάδες.

      Άννα, χάρηκα που έμαθε ότι μπορεί να αλλάξει γνώμη. Νίκο, χάρηκα που τον είδα να μαθαίνει.

      Στους δύο σας. Στα όσα δεν χάθηκαν στη μετακόμιση.
    note: "Generic opener cut. Specific scene earns the audience's attention. Triple-adjective stack replaced with one specific observation."

app-or-ui-copy:
  - input: |
      Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το αρχείο; Αυτή η ενέργεια δεν μπορεί να αναιρεθεί. Όλα τα δεδομένα που σχετίζονται με αυτό το αρχείο θα χαθούν μόνιμα. Παρακαλώ επιβεβαιώστε την ενέργειά σας.

      [ Ναι, είμαι σίγουρος ] [ Όχι, ακύρωση ]
    output: |
      Διαγραφή του αρχείου;
      Δεν αναιρείται.

      [ Διαγραφή ] [ Άκυρο ]
    note: "Action verbs as button labels. 46 chars vs 230. Same information, less friction."

lexilog-tiktok-caption:
  # Gold standard 1: ατόφιο. Quality word, declarative-with-contrast hook,
  # «Λέμε για...» examples list with material+spiritual mix.
  - input: |
      Υπάρχουν πράγματα που δεν θέλουν στολίδια. Θέλουν να μείνουν ατόφια.

      Η λέξη «ατόφιο» περιγράφει κάτι που μένει ολόκληρο, καθαρό και γνήσιο, χωρίς να χάνει την αρχική του μορφή ή αξία.

      Τι σημαίνει, όμως, στην πράξη;

      Το «ατόφιο» είναι αυτό που δεν έχει αλλοιωθεί, αναμειχθεί ή χαλάσει. Μπορεί να είναι ατόφιο χρυσάφι, αλλά και ατόφιο συναίσθημα, ατόφια χαρά ή ατόφιος χαρακτήρας.

      Ετυμολογία: Από το «αυτόφυος» / «αυτοφυής», δηλαδή αυτό που βγαίνει από μόνο του και μένει φυσικό, χωρίς ξένη πρόσμειξη. ([Βικιλεξικό][1])

      Παράδειγμα: «Η χαρά της ήταν ατόφια, χωρίς ίχνος προσποίησης.»

      Ακολουθήστε το Lexilog.io για περισσότερες ελληνικές λέξεις και μπείτε στο lexilog.io για να τις ανακαλύπτετε καθημερινά, με καθαρές και απλές εξηγήσεις.

      #lexilogio #greektiktok #ελληνικέςλέξεις #ατόφιο #λεξιλόγιο
    output: |
      Κάποια πράγματα έχουν αξία μόνο όταν μένουν ατόφια.

      Η λέξη περιγράφει ό,τι παραμένει ολόκληρο, γνήσιο και καθαρό, χωρίς να έχει υποστεί καμία αλλοίωση ή ανάμειξη.

      Τι σημαίνει στην πράξη;
      Είναι το αυθεντικό, αυτό που δεν έχει νοθευτεί. Λέμε για ατόφιο χρυσάφι, αλλά και για έναν ατόφιο χαρακτήρα ή μια ατόφια χαρά που δεν κρύβει τίποτα από πίσω.

      Ετυμολογία: Από το αυτόφυος (αυτός που αναπτύσσεται μόνος του, με τις δικές του δυνάμεις). Σημαίνει το φυσικό, αυτό που δεν έχει ξένα στοιχεία μέσα του.

      Παράδειγμα: «Μας κέρδισε με την ατόφια ειλικρίνειά του.»

      Ακολουθήστε το Lexilog.io για περισσότερες ελληνικές λέξεις και μπείτε στο lexilog.io για να τις ανακαλύπτετε καθημερινά.

      #lexilogio #greektiktok #ελληνικέςλέξεις #ατόφιο #λεξιλόγιο
    note: "Anthropomorphic «πράγματα θέλουν» hook out. «Λέμε για...» listicle (material gold + spiritual character + emotional joy) in. Citation refs + «καθαρές και απλές εξηγήσεις» CTA tail cut."

  # Gold standard 2: μνησικακία. Behavior word, interrogative+2nd-singular hook
  # using related word «κακία», concrete-label («σκουριά της ψυχής») + «Όταν...»
  # describing two modes (revenge or refusal). Word as active subject in example.
  - input: |
      Πόσο βάρος έχει μια μνησικακία που δεν αφήνουμε να φύγει;

      Η λέξη περιγράφει την επιμονή στη μνήμη μιας προσβολής. Είναι το βάρος που κουβαλάμε όταν αρνούμαστε να συγχωρήσουμε.

      Τι σημαίνει στην πράξη;
      Είναι ο εσωτερικός λογαριασμός που δεν κλείνει. Όταν κρατάμε ζωντανή την πικρία για ένα παλιό κακό, η ίδια η μνήμη γίνεται η τιμωρία μας.

      Ετυμολογία: Σύνθετη λέξη από το ρηματικό θέμα μνησι- (από το μιμνῄσκομαι, θυμάμαι) και την κακία.

      Παράδειγμα: «Δεν τον πλήγωσε τόσο η ίδια η προδοσία, όσο η μνησικακία που κράτησε χρόνια μέσα του.»
    output: |
      Πόσο βάρος μπορεί να έχει μια κακία που αρνείσαι να ξεχάσεις;

      Η μνησικακία είναι η επίμονη διατήρηση του μίσους ή της οργής για ένα κακό που μας συνέβη στο παρελθόν. Είναι η άρνηση της συγχώρησης και η συνειδητή απόφαση να κρατήσουμε την πληγή ανοιχτή.

      Τι σημαίνει στην πράξη;
      Είναι η «σκουριά» της ψυχής. Όταν κάποιος δεν ξεπερνά το αδίκημα, αλλά το «συντηρεί» μέσα του, περιμένοντας την κατάλληλη στιγμή για να το ανταποδώσει ή απλώς αρνούμενος να προχωρήσει.

      Ετυμολογία: Από το μιμνήσκομαι (θυμάμαι) + κάκη (κακία). Η λέξη φανερώνει ακριβώς τη λειτουργία της: η μνήμη που τρέφεται από το κακό.

      Παράδειγμα: «Η μνησικακία του τον δηλητηρίαζε περισσότερο από όσο τον έβλαψε η αρχική αδικία.»
    note: |
      Hook uses related word «κακία» (priming etymology). Concrete label
      «σκουριά της ψυχής» (visceral organic) beats «εσωτερικός λογαριασμός»
      (intellectual financial). «Όταν...» describes two modes, doesn't moralize.
      Etymology «X + Y» format with personifying close «τρέφεται από το κακό».
      Example: word as active subject «δηλητηρίαζε» (the word ACTS on the carrier).
